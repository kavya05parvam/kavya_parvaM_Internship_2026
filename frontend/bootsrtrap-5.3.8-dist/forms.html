<!-- form-label for labels but form-check-label for checkboxes and radio buttons
 form-conttrol for most of the input fields but form-check-input for checkboxes and radio buttons
 form-select for select dropdowns and form-range will be used with range input field -->
<!doctype html>
<html lang="en">
  <head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />

    <!-- Bootstrap CSS v5.2.1 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
      crossorigin="anonymous"
    />
  </head>

  <body>
    <form action="">
      <div class="mb-3">
        <label class="form-label" for="name">Name:</label>
        <input type="text" class="form-control" id="name" name="name" />
      </div>
      
      <div class="form-floating mb-3">
  <input type="email" class="form-control" id="floatingInput" placeholder="name@example.com">
  <label for="floatingInput">Email address</label>
</div>
<div class="form-floating">
  <input type="password" class="form-control" id="floatingPassword" placeholder="Password">
  <label for="floatingPassword">Password</label>
</div>
     
     
      <div class="form-check">
        <input
          class="form-check-input"
          type="radio"
          name="radioDefault"
          id="radioDefault1"
        />
        <label class="form-check-label" for="radioDefault1"> male </label>
      </div>
      <div class="form-check">
        <input
          class="form-check-input"
          type="radio"
          name="radioDefault"
          id="radioDefault2"
          checked
        />
        <label class="form-check-label" for="radioDefault2"> female </label>
      </div>
      <div class="d-flex gap-2">
        <div class="form-check">
          <input
            class="form-check-input"
            type="checkbox"
            value="kannada"
            id="checkDefault"
          />
          <label class="form-check-label" for="checkDefault">
            Default checkbox
          </label>
        </div>
        <div class="form-check">
          <input
            class="form-check-input"
            type="checkbox"
            value="hindi"
            id="checkChecked"
            checked
          />
          <label class="form-check-label" for="checkChecked">
            Checked checkbox
          </label>
        </div>
        <div class="form-check">
          <input
            class="form-check-input"
            type="checkbox"
            id="hobbies2"
            name="hobbies"
            value="music"
          />
          <label class="form-check-label" for="hobbies2"> Music </label>
        </div>
        <div class="form-check">
          <input
            class="form-check-input"
            type="checkbox"
            id="hobbies3"
            name="hobbies"
            value="reading"
          />
          <label class="form-check-label" for="hobbies3"> Reading </label>
        </div>
      </div>
      <div class="mb-3">
        <label for="address" class="form-label">Address:</label>
        <textarea class="form-control" id="address" name="address" rows="3"></textarea>
      </div>
      <div class="mb-3">
        <label for="dob" class="form-label">Date of Birth:</label>
        <input type="date" class="form-control" id="dob" name="dob" />
      </div>
      <div>
        <div class="mb-3">
            <label for="course">Course:</label>
            <select id="course" name="course" class="form-select">
              <option value="bca">BCA</option>
              <option value="btech">B.Tech</option>
              <option value="mca">MCA</option>
            </select>
        </div>
        <div class="mb-3">
            <label for="rating" class="form-label">Give rating:</label>
            <input type="range" class="form-range" id="rating" name="rating" min="1" max="5" />
        </div>
        </div>
        <button type="reset" class="btn btn-danger">Clear form</button>
      </div>
      <div>
        <button type="submit" class="btn btn-primary">Submit</button>
      </div>
    </form>
    <!-- Bootstrap JavaScript Libraries -->
    <script
      src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
      integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
      crossorigin="anonymous"
    ></script>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
      integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
      crossorigin="anonymous"
    ></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .box {
        width: 300px;
        height: 300px;
        border-left: 5px solid black;
        border-right: 5px solid black;
        border-bottom: 5px solid black;
        border-top: 5px solid black;
      }
      .ball {
        width: 100px;
        height: 100px;
        background-color: red;
        border-radius: 50%;
        transform: translate(100px, 200px);
        animation: bounce 5s ease-in-out infinite;
      }
      /* animation: name duration timing-function delay iteration-count direction fill-mode; */
      /* position: absolute;
        animation: moveBall 2s linear infinite; */
      .second-ball {
        width: 50px;
        height: 50px;
        background-color: rgb(14, 14, 111);
        border-radius: 50%;
        transform: translate(100px, 200px);
        /* position: absolute;
          top: 150px;
          left: 150px; */
        animation: diagonalbounce 5s ease-in-out infinite;
      }
      .third-ball {
        width: 75px;
        height: 75px;
        background-color: blue;
        border-radius: 50%;
        /* position: absolute; */
        /* top: 150px;
        left: 150px; */
        transform: translate(100px, 200px);
        animation: diagonalbounce 2s ease-in-out infinite;
      }
      .fourth-ball {
        width: 80px;
        height: 80px;
        background-color: rgb(255, 0, 144);
        border-radius: 50%;
        /* position: absolute; */
        /* top: 150px;
        left: 150px; */
        transform: translate(100px, 200px);
        animation: move 3s ease-in-out infinite;
      }

      .ball:hover {
        animation-play-state: paused;
      }

      .second-ball:hover {
        animation-play-state: paused;
      }
      .third-ball:hover {
        animation-play-state: paused;
      }
      .fourth-ball:hover {
        animation-play-state: paused;
      }

      @keyframes bounce {
        0% {
          transform: translate(100px, 100px);
        }
        25% {
          transform: translate(100px, 200px);
        }
        50% {
          transform: translate(100px, 120px);
        }
        75% {
          transform: translate(100px, 200px);
        }
        100% {
          transform: translate(100px, 100px);
        }
      }
      @keyframes diagonalbounce {
        0% {
          transform: translate(0px, 0px);
        }
        20% {
          transform: translate(200px, 0px);
        }
        40% {
          transform: translate(200px, 200px);
        }
        60% {
          transform: translate(0px, 200px);
        }
        80% {
          transform: translate(0px, 0px);
        }
        100% {
          transform: translate(100px, 100px);
        }
      }
      @keyframes diagonalbounce {
        0% {
          transform: translate(0px, 0px);
          background-color: plum;
        }
        25% {
          transform: translate(200px, 0px);
          background-color: purple;
        }
        50% {
          transform: translate(200px, 200px);
          background-color: violet;
        }
        75% {
          transform: translate(0px, 200px);
          background-color: indigo;
        }
        100% {
          transform: translate(0px, 0px);
          background-color: plum;
        }
      }
      @keyframes move {
        11%,
        33%,
        55%,
        77% {
          transform: scale(1.2);
        }
      }
      .outer-box {
        width: 800px;
        height: 300px;
        border: 5px solid black;
        padding: 20px;
        display: flex;
        justify-content: space-evenly;
        align-items: center;
        gap: 20px;
      }
      .inner-box {
        width: 100px;
        height: 100px;
        animation-name: floatRotate;
        animation-duration: 5s;
        animation-timing-function: ease-in-out;
        animation-iteration-count: infinite;
      }
      .box1 {
        background-color: rosybrown;
        animation-delay: 0.2s;
      }
      .box2 {
        background-color: lightblue;
        animation-delay: 0.4s;
      }
      .box3 {
        background-color: lightgreen;
        animation-delay: 0.6s;
      }
      .box4 {
        background-color: lightcoral;
        animation-delay: 0.8s;
      }
      @keyframes floatRotate {
        0% {
          transform: translateY(0) rotate(0deg);
        }
        25% {
          transform: translateY(-20px) rotate(45deg);
        }
        50% {
          transform: translateY(0) rotate(90deg);
        }
        75% {
          transform: translateY(-20px) rotate(135deg);
        }
        100% {
          transform: translateY(0) rotate(180deg);
        }
      }

      /* @keyframes moveBall {
        0% {
          left: 0;
          top: 0;
        }
        25% {
          left: 200px;
          top: 0;
        }
        50% {
          left: 200px;
          top: 200px;
        }
        75% {
          left: 0;
          top: 200px;
        }
        100% {
          left: 0;
          top: 0;
        } */
      /* } */
      .preloader {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        border-top: 5px solid rgb(43, 7, 29);
        border-bottom: 5px solid rgb(13, 89, 49);
        animation-name: loading;
        animation-duration: 5s;
        animation-timing-function: linear;
        animation-iteration-count: infinite;
        animation-direction: normal;
      }
      .line {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        border-top: 5px solid rgb(43, 7, 29);
        border-bottom: 5px solid rgb(13, 89, 49);
        animation-name: loading;
        animation-duration: 5s;
        animation-timing-function: linear;
        animation-iteration-count: infinite;
        animation-direction: reverse;
      }
      @keyframes loading {
        0% {
          transform: rotate(0deg);
        }
        12% {
          transform: rotate(45deg);
        }
        24% {
          transform: rotate(180deg);
        }
        36% {
          transform: rotate(270deg);
        }
        48% {
          transform: rotate(360deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="box">
      <div class="ball"></div>
    </div>
    <div class="box">
      <div class="second-ball"></div>
    </div>
    <div class="box">
      <div class="third-ball"></div>
    </div>
    <div class="box">
      <div class="fourth-ball"></div>
    </div>
    <div class="outer-box">
      <div class="inner-box box1"></div>
      <div class="inner-box box2"></div>
      <div class="inner-box box3"></div>
      <div class="inner-box box4"></div>
    </div>
    <div class="preloader">
      <div class="line"></div>
    </div>
  </body>
</html>

<head>

    <style>
        /* BOX Model */
        /* It consists of Margin, padding, border */
        h1{
            background-color:blue;
            color: rgb(14, 111, 196);
            /*margin will apply outside */
            /* paddoing will apply inside */
            margin: 100px; 
            padding: 30px;
        }
    </style>
</head>
<body>
    <h1>This is a Box Model</h1>
    <p></p>
    
</body>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .form-field {
        margin: 20px;
      }
      input {
        width: 100%;
        padding: 5px;
        font-size: 20px;
        color: #000;
        text-transform: capitalize;
      }
      label {
        font-size: 20px;
        font-weight: bold;
      }
      input:focus {
        border: 2px solid blue;
        outline: none;
      }
      input[type="checkbox"],
      input[type="radio"] {
        width: auto;
        margin-right: 10px;
      }
      input:checked {
        background-color: lightgreen;
        outline: 2px solid green;
      }
      select {
        width: 100%;
        padding: 5px;
        font-size: 20px;
      }
      input:out-of-range {
        border: 2px solid red;
        background-color: lightcoral;
      }
      input:required:invalid {
        border: 2px solid red;
      }
      input:disabled {
        background-color: rgb(157, 51, 51);
      }

      .btn {
        background-color: lightcoral;
        padding: 10px 20px;
        border-radius: 5px;
        cursor: pointer;
        font-size: 20px;
        color: white;
        border: none;
      }
      .submit-btn:hover {
        background-color: lightgreen;
        color: black;
      }

      .reset-btn:hover {
        background-color: red;
      }
      /*  */
      .btn-group {
        display: flex;
        gap: 10px;
      }
    </style>
  </head>
  <body>
    <h1>Registration Form</h1>
    <form>
      <div class="form-field">
        <label for="name">Name:</label>
        <input type="text" name="name" id="name" />
      </div>
      <div class="form-field">
        <label for="age">Age:</label>
        <input type="number" min="0" max="100" id="age" />
      </div>
      <div class="form-field">
        <label for="email">Email ID:</label>
        <input type="email" name="email" id="email" />
      </div>
      <div class="form-field">
        <label for="phone" aria-required="true">Phone Number:</label>
        <input type="tel" name="phone" id="phone" />
      </div>
      <div class="form-field">
        <label for="password" aria-disabled="true">Password:</label>
        <input type="password" name="password" id="password" />
      </div>
      <div class="form-field">
        <label for="address">Address:</label>
        <textarea rows="10" cols="50" name="address" id="address"></textarea>
      </div>
      <div class="form-field">
        <label for="gender">Gender:</label>
        <input type="radio" name="gender" id="male" value="Male" checked />
        <label for="male">Male</label>
        <input type="radio" name="gender" id="female" value="Female" />
        <label for="female">Female</label>
      </div>
      <div class="form-field">
        <label for="subject">Favorite Subjects:</label>
        <input type="checkbox" name="subject" id="physics" value="Physics" />
        <label for="physics">Physics</label>
        <input
          type="checkbox"
          name="subject"
          id="chemistry"
          value="Chemistry"
        />
        <label for="chemistry">Chemistry</label>
        <input
          type="checkbox"
          name="subject"
          id="mathematics"
          value="Mathematics"
        />
        <label for="mathematics">Mathematics</label>
        <input
          type="checkbox"
          name="subject"
          id="computer-science"
          value="CS"
        />
        <label for="computer-science">Computer Science</label>
      </div>
      <div class="form-field">
        <label for="travelling-mode">Mode of Travelling:</label>
        <select name="travelling-mode" id="travelling-mode">
          <option value="">Select your Travelling Mode</option>
          <option value="Bus" selected>Bus</option>
          <option value="Car">Car</option>
          <option value="Bike">Bike</option>
          <option value="Cab">Cab</option>
          <option value="Metro">Metro</option>
        </select>
      </div>

      <div class="btn-group">
        <input class="btn submit-btn" type="submit" value="Submit Form" />
        <input class="btn reset-btn" type="reset" value="Reset Form" />
      </div>
    </form>
  </body>
</html>

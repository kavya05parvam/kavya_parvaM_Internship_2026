<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .parent {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        /* repeat(count, size) */
        grid-template-rows: repeat(4, 1fr);
        /* grid-column-gap: 20px;
            grid-row-gap: 10px; */
        /* gap: 10px; */
        /* grid-gap: 20px 10px; */
        /* row-gap column-gap */
        grid-gap: 10px;
        /* for both same */
        /* for placing the items alignment we use justify-items and align-items */
        justify-items: center;
        /* start center end */
        align-items: center;
        /* start center end */
        justify-content: center;
        /* start center end space-around space-between */
        align-content: center;
        /* start center end space-around space-between */
      }
      .child1 {
        grid-area: 1 / 1 / 3 / 2;
        background-color: green;
      }
      .child2 {
        grid-area: 1 / 2 / 2 / 4;
        background-color: lightblue;
      }
      .child3 {
        grid-area: 1 / 4 / 2 / 5;
        background-color: lightcoral;
      }
      .child4 {
        grid-area: 2 / 2 / 3 / 3;
        background-color: lightgreen;
      }
      .child5 {
        grid-area: 2 / 3 / 3 / 4;
        background-color: lightyellow;
      }
      .child6 {
        grid-area: 2 / 4 / 4 / 5;
        background-color: rgb(200, 100, 170);
      }
      .child7 {
        grid-area: 3 / 2 / 4 / 3;
        background-color: lightseagreen;
      }
      .child8 {
        grid-area: 3 / 3 / 4 / 4;
        background-color: lightsalmon;
      }
    </style>
  </head>
  <body>
    <div class="parent">
      <div class="child1">Child 1</div>
      <div class="child2">Child 2</div>
      <div class="child3">Child 3</div>
      <div class="child4">Child 4</div>
      <div class="child5">Child 5</div>
      <div class="child6">Child 6</div>
      <div class="child7">Child 7</div>
      <div class="child8">Child 8</div>
    </div>
  </body>
</html>

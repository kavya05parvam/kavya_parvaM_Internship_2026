<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .parent {
        display: grid;
        height: 500px;
        grid-template-columns: repeat(4, 1fr);
        /* repeat(count, size) */
        /* grid-template-rows: repeat(2, 200px); */
        /* grid-column-gap: 20px;
            grid-row-gap: 10px; */
        /* gap: 10px; */
        /* grid-gap: 20px 10px; */
        /* row-gap column-gap */
        grid-gap: 10px;
        /* for both same */
        /* for placing the items alignment we use justify-items and align-items */
        /* justify-items: center; */
        /* start center end */
        /* align-items: center; */
        /* start center end */
        /* justify-content: center; */
        /* start center end space-around space-between */
        /* align-content: center;
        start center end space-around space-between */
      }
      .child1,
      .child2,
      .child3,
      .child4,
      .child5,
      .child6,
      .child7,
      .child8 {
        /* width: 100px;
        height: 100px; */
        background-color: lightblue;
        color: black;
        /* border: 1px solid black;
        padding: 20px; */
        /* to place the text in the center */
        font-size: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .layout1 {
        grid-area: 1 / 1 / 4 / 2;
        background-color: green;
      }
      .layout2 {
        grid-area: 1 / 2 / 2 / 4;
        background-color: lightblue;
      }
      .layout3 {
        grid-area: 1 / 4 / 2 / 5;
        background-color: lightcoral;
      }
      .layout4 {
        grid-area: 2 / 2 / 3 / 3;
        background-color: lightgreen;
      }
      .layout5 {
        grid-area: 2 / 3 / 3 / 4;
        background-color: lightyellow;
      }
      .layout6 {
        grid-area: 2 / 4 / 4 / 5;
        background-color: rgb(200, 100, 170);
      }
      .layout7 {
        grid-area: 3 / 2 / 4 / 3;
        background-color: lightseagreen;
      }
      .layout8 {
        grid-area: 3 / 3 / 4 / 4;
        background-color: lightsalmon;
      }
    </style>
  </head>
  <body>
    <div class="parent">
      <div class="child1 layout1">layout1</div>
      <div class="child2 layout2">layout2</div>
      <div class="child3 layout3">layout3</div>
      <div class="child4 layout4">layout4</div>
      <div class="child5 layout5">layout5</div>
      <div class="child6 layout6">layout6</div>
      <div class="child7 layout7">layout7</div>
      <div class="child8 layout8">layout8</div>
    </div>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Array Clone in JS</h1>
    <p>1. Spread</p>
    <p>2. Splice()</p>
    <p>3. Concat()</p>

    <script>
      const arr1 = [1, 2, 3, 4, 5, 6];
      const arr2 = arr1;
      arr1[4] = 600;
      console.log(arr1);
      console.log(arr2);

      //   const arr2 = [...arr1];
      //   arr1[4] = 600;
      //   console.log(arr1);
      //   console.log(arr2);

      const arr3 = arr1.slice(0);
      arr1[0] = 100;
      console.log(arr1);
      console.log(arr3);

      const arr4 = [].concat(arr1);
      console.log(arr1);
      console.log(arr4);
    </script>
  </body>
</html>

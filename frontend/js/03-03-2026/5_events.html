<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Events in js</h1>
    <p>1. Mouse Events - click, dblclick(double click),mouseover, mouseout</p>
    <p>2. Keyboard Events - keydown and keyup</p>
    <p>3. Form Events - input, blur, change, submit</p>
    <p>4. Clipboard - copy, paste, cut</p>
    <p>5. Window -</p>

    <button id="click1" onclick="handleClick()">click1</button>
    <button id="click2">click2</button>

    <script>
      const handleClick = () => {
        console.log("Clicked the Button");
      };

      //imp
      const click2 = document.getElementById("click2");
      //(event,listener)
      click2.addEventListener("mouseout", () => {
        // handleClick();
        console.log("clicked");
      });
    </script>
  </body>
</html>

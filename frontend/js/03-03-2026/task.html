<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Event in js</h1>
    <p>
      1.mouse event - click, dblclick, mouseover, mouseout, mousedown, mouseup,
      mousemove, contextmenu
    </p>
    <p>2.keyboard</p>
    <p>3.form events - input, blur, change, submit</p>

    <button id="click1" onclick="handleClick()">click1</button>
    <button id="click2">click2</button>
    <button id="click3">click3</button>

    <script>
      // Click (Inline Event)
      const handleClick = () => {
        console.log("Single Clicked");
      };

      const click2 = document.getElementById("click2");
      const click3 = document.getElementById("click3");

      // Double Click
      click2.addEventListener("dblclick", () => {
        console.log("Double Clicked");
      });

      // Mouse Over
      click2.addEventListener("mouseover", () => {
        console.log("Mouse Over Button");
      });

      // Mouse Out
      click2.addEventListener("mouseout", () => {
        console.log("Mouse Out Button");
      });

      // Mouse Down
      click3.addEventListener("mousedown", () => {
        console.log("Mouse Button Pressed");
      });

      // Mouse Up
      click3.addEventListener("mouseup", () => {
        console.log("Mouse Button Released");
      });

      // Mouse Move
      click3.addEventListener("mousemove", () => {
        console.log("Mouse Moving on Button");
      });

      // Right Click
      click3.addEventListener("contextmenu", (e) => {
        e.preventDefault();
        console.log("Right Clicked");
      });
    </script>
  </body>
</html>

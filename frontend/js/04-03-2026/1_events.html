<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    input,blur,change,focus,submit
    <form action="" id="contact-form" novalidate>
      <label for="name">Nmae: </label>
      <input
        type="text"
        name="name"
        id="name"
        placeholder="enter name"
        required
      />
      <br />
      <label for="email">Email: </label>
      <input
        type="email"
        name="email"
        id="email"
        placeholder="enter email"
        required
      />
      <br />
      <label>Gender:</label>
      <label for="male">Male</label>
      <input type="radio" name="gender" id="male" value="male" required />
      <label for="female">Female</label>
      <input type="radio" name="gender" id="female" value="female" required />
      <br />
      <label for="city">City: </label>
      <select name="city" id="city">
        <option value="bengaluru">Bengaluru</option>
        <option value="mumbai">Mumbai</option>
      </select>
      <br />
      <button type="submit">Submit</button>
    </form>

    <script>
      //onspot input event and out of the scope blur event
      const email = document.querySelector("#email");
      email.addEventListener("blur", (event) => {
        console.log("blur event trigger value is:", event.target.value);
      });

      //change
      const city = document.getElementById("city");
      city.addEventListener("change", (e) => {
        console.log("city value changed", e.target.value);
      });

      //focus
      const name = document.querySelector("#name");
      name.addEventListener("focus", () => {
        console.log("name input field focus");
      });

      //submit
      const contactform = document.querySelector("#contact-form");
      contactform.addEventListener("submit", (e) => {
        e.preventDefault();
        console.log("form is submitted", e.target.value);
      });
    </script>
  </body>
</html>

      <br>
     <select id="course" class="form-select form-select-sm mb-3" aria-label="Large select example">

</select>
<br>

</div>

</div>
<div id="gender" class="form-check form-check-inline">

</div>
<br>
<br>
<div id="skill" class="form-check form-check-inline">

</div>
<div id="skill" class="form-check form-check-inline">

<div id="skill" class="form-check form-check-inline">

</div>
<br>
<br>
<div id="address" class="form-floating">

 <div id="submit" class="col-12">

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Student CRUD</title>
  </head>
  <body>
    <h1>Student CRUD Using Given Data</h1>

    <!-- =========================
     Add Student Form
========================= -->
    <input type="text" id="name" placeholder="Enter Name" />
    <input type="text" id="marks" placeholder="Enter Marks (comma separated)" />
    <button onclick="addStudent()">Add Student</button>

    <br /><br />

    <!-- =========================
     Student Table
========================= -->
    <table border ="1">
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Marks</th>
          <th>Total</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="studentTable"></tbody>
    </table>

    <script>
      const students = [
        { id: 1, name: "Rahul", marks: [80, 75, 90] },
        { id: 2, name: "Sneha", marks: [60, 70, 65] },
        { id: 3, name: "Arjun", marks: [95, 92, 88] },
      ];

      // =========================
      // Display Students (READ)
      // =========================
      function displayStudents() {
        const table = document.getElementById("studentTable");
        table.innerHTML = "";

        students.forEach((student, index) => {
          const total = student.marks.reduce((sum, mark) => sum + mark, 0);

          table.innerHTML += `
            <tr>
                <td>${student.id}</td>
                <td>${student.name}</td>
                <td>${student.marks.join(", ")}</td>
                <td>${total}</td>
                <td>
                    <button onclick="deleteStudent(${index})">
                        Delete
                    </button>
                </td>
            </tr>
        `;
        });
      }

      // =========================
      // Add Student (CREATE)
      // =========================
      function addStudent() {
        const name = document.getElementById("name").value;
        const marksInput = document.getElementById("marks").value;

        if (name === "" || marksInput === "") {
          alert("Please fill all fields");
          return;
        }

        const marks = marksInput.split(",").map((num) => Number(num.trim()));

        const newStudent = {
          id: students.length + 1,
          name: name,
          marks: marks,
        };

        students.push(newStudent);

        displayStudents();

        document.getElementById("name").value = "";
        document.getElementById("marks").value = "";
      }

      // =========================
      // Delete Student (DELETE)
      // =========================
      function deleteStudent(index) {
        students.splice(index, 1);
        displayStudents();
      }

      // Initial display
      displayStudents();
    </script>
  </body>
</html>

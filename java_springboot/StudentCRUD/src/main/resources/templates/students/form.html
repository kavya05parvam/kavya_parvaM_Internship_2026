<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title th:text="${formTitle}">Student Form</title>
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">
  <h2 th:text="${formTitle}">Student Form</h2>
  <!-- Determine if edit or create -->
  <form th:action="${student.id != null}
    ? @{/students/{id}/update(id=${student.id})}
    : @{/students}"
    th:object="${student}" method="post">
    <div class="mb-3">
      <label class="form-label">Name</label>
      <input type="text" class="form-control" th:field="*{name}">
      <span class="text-danger" th:if="${#fields.hasErrors('name')}"
            th:errors="*{name}"></span>
    </div>
    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" class="form-control" th:field="*{email}">
      <span class="text-danger" th:if="${#fields.hasErrors('email')}"
            th:errors="*{email}"></span>
    </div>
    <div class="mb-3">
      <label class="form-label">Age</label>
      <input type="number" class="form-control" th:field="*{age}">
      <span class="text-danger" th:if="${#fields.hasErrors('age')}"
            th:errors="*{age}"></span>
    </div>
    <div class="mb-3">
      <label class="form-label">Course</label>
      <input type="text" class="form-control" th:field="*{course}">
      <span class="text-danger" th:if="${#fields.hasErrors('course')}"
            th:errors="*{course}"></span>
    </div>
    <button type="submit" class="btn btn-primary">Save</button>
    <a href="/students" class="btn btn-secondary">Cancel</a>
  </form>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Students</title>
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">
  <h2>All Students
    <a href="/students/new" class="btn btn-success btn-sm ms-3">+ Add New</a>
  </h2>
  <!-- Flash message -->
  <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
  <table class="table table-striped table-hover">
    <thead class="table-dark">
      <tr>
        <th>ID</th><th>Name</th><th>Email</th><th>Age</th>
        <th>Course</th><th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr th:each="student : ${students}">
        <td th:text="${student.id}"></td>
        <td th:text="${student.name}"></td>
        <td th:text="${student.email}"></td>
        <td th:text="${student.age}"></td>
        <td th:text="${student.course}"></td>
        <td>
          <!-- View -->
          <a th:href="@{/students/{id}(id=${student.id})}"
             class="btn btn-info btn-sm">View</a>
          <!-- Edit -->
          <a th:href="@{/students/{id}/edit(id=${student.id})}"
             class="btn btn-warning btn-sm">Edit</a>
          <!-- Delete -->
          <form th:action="@{/students/{id}/delete(id=${student.id})}"
                method="post" style="display:inline">
            <button class="btn btn-danger btn-sm"
              onclick="return confirm('Delete this student?')">Delete</button>
          </form>
        </td>
      </tr>
    </tbody>
  </table>
</body>
</html>

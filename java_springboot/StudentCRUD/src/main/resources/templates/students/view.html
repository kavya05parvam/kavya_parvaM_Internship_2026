<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Student Detail</title>
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">
  <h2>Student Detail</h2>
  <div class="card p-4">
    <p><strong>ID:</strong>     <span th:text="${student.id}"></span></p>
    <p><strong>Name:</strong>   <span th:text="${student.name}"></span></p>
    <p><strong>Email:</strong>  <span th:text="${student.email}"></span></p>
    <p><strong>Age:</strong>    <span th:text="${student.age}"></span></p>
    <p><strong>Course:</strong> <span th:text="${student.course}"></span></p>
  </div>
  <div class="mt-3">
    <a th:href="@{/students/{id}/edit(id=${student.id})}"
       class="btn btn-warning">Edit</a>
    <a href="/students" class="btn btn-secondary">Back to List</a>
  </div>
</body>
</html>
